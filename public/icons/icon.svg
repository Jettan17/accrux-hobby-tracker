    <circle cx="140" cy="-70" r="4" fill="#a855f7" opacity="0.7"/>
    <circle cx="-100" cy="110" r="5" fill="#22c55e" opacity="0.8"/>
    <circle cx="120" cy="100" r="3" fill="#f59e0b" opacity="0.7"/>
    <!-- Orbital ring -->
